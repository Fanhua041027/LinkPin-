<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 行为面试精讲课程 - 人物对话图标 -->
  <defs>
    <linearGradient id="behaviorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="45" fill="url(#behaviorGrad)" opacity="0.1"/>
  
  <!-- 左侧人物 -->
  <g transform="translate(25, 35)">
    <!-- 头部 -->
    <circle cx="0" cy="0" r="8" fill="url(#behaviorGrad)"/>
    <!-- 身体 -->
    <rect x="-6" y="8" width="12" height="20" rx="6" fill="url(#behaviorGrad)" opacity="0.8"/>
    <!-- 手臂 -->
    <ellipse cx="-8" cy="15" rx="3" ry="8" fill="url(#behaviorGrad)" opacity="0.6"/>
    <ellipse cx="8" cy="15" rx="3" ry="8" fill="url(#behaviorGrad)" opacity="0.6"/>
  </g>
  
  <!-- 右侧人物 -->
  <g transform="translate(75, 35)">
    <!-- 头部 -->
    <circle cx="0" cy="0" r="8" fill="url(#behaviorGrad)"/>
    <!-- 身体 -->
    <rect x="-6" y="8" width="12" height="20" rx="6" fill="url(#behaviorGrad)" opacity="0.8"/>
    <!-- 手臂 -->
    <ellipse cx="-8" cy="15" rx="3" ry="8" fill="url(#behaviorGrad)" opacity="0.6"/>
    <ellipse cx="8" cy="15" rx="3" ry="8" fill="url(#behaviorGrad)" opacity="0.6"/>
  </g>
  
  <!-- 对话气泡1 -->
  <g transform="translate(35, 20)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="white" stroke="url(#behaviorGrad)" stroke-width="2"/>
    <!-- 气泡尾巴 -->
    <path d="M -8 6 L -10 12 L -5 8 Z" fill="white" stroke="url(#behaviorGrad)" stroke-width="1"/>
    <!-- 对话内容 -->
    <circle cx="-4" cy="-2" r="1" fill="url(#behaviorGrad)"/>
    <circle cx="0" cy="-2" r="1" fill="url(#behaviorGrad)"/>
    <circle cx="4" cy="-2" r="1" fill="url(#behaviorGrad)"/>
  </g>
  
  <!-- 对话气泡2 -->
  <g transform="translate(65, 15)">
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="white" stroke="url(#behaviorGrad)" stroke-width="2"/>
    <!-- 气泡尾巴 -->
    <path d="M 6 4 L 8 10 L 3 6 Z" fill="white" stroke="url(#behaviorGrad)" stroke-width="1"/>
    <!-- 对话内容 -->
    <rect x="-6" y="-2" width="12" height="1" fill="url(#behaviorGrad)"/>
    <rect x="-4" y="0" width="8" height="1" fill="url(#behaviorGrad)"/>
  </g>
  
  <!-- 握手图标 -->
  <g transform="translate(50, 70)">
    <!-- 左手 -->
    <path d="M -8 0 Q -12 -4 -8 -8 Q -4 -4 0 0" fill="url(#behaviorGrad)" opacity="0.7"/>
    <!-- 右手 -->
    <path d="M 8 0 Q 12 -4 8 -8 Q 4 -4 0 0" fill="url(#behaviorGrad)" opacity="0.7"/>
    <!-- 握手连接 -->
    <ellipse cx="0" cy="-2" rx="4" ry="2" fill="url(#behaviorGrad)"/>
  </g>
  
  <!-- 装饰性星星 -->
  <g transform="translate(15, 75)">
    <path d="M 0 -3 L 1 0 L 3 0 L 1 2 L 2 4 L 0 3 L -2 4 L -1 2 L -3 0 L -1 0 Z" fill="url(#behaviorGrad)" opacity="0.6"/>
  </g>
  
  <g transform="translate(85, 75)">
    <path d="M 0 -2 L 0.5 0 L 2 0 L 0.5 1 L 1 3 L 0 2 L -1 3 L -0.5 1 L -2 0 L -0.5 0 Z" fill="url(#behaviorGrad)" opacity="0.4"/>
  </g>
</svg>
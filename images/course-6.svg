<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 职场礼仪与形象管理 - 西装领带图标 -->
  <defs>
    <linearGradient id="etiquetteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <pattern id="tiePattern" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="url(#etiquetteGrad)" opacity="0.1"/>
      <circle cx="2" cy="2" r="0.5" fill="url(#etiquetteGrad)" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="45" fill="url(#etiquetteGrad)" opacity="0.1"/>
  
  <!-- 西装外套 -->
  <g transform="translate(50, 50)">
    <!-- 西装主体 -->
    <path d="M -20 -15 L -25 -10 L -25 25 L -15 30 L 15 30 L 25 25 L 25 -10 L 20 -15 L 10 -20 L -10 -20 Z" fill="url(#etiquetteGrad)" opacity="0.8"/>
    
    <!-- 西装翻领 -->
    <path d="M -10 -20 L -15 -15 L -8 -5 L 0 -10 Z" fill="url(#etiquetteGrad)"/>
    <path d="M 10 -20 L 15 -15 L 8 -5 L 0 -10 Z" fill="url(#etiquetteGrad)"/>
    
    <!-- 西装纽扣 -->
    <circle cx="0" cy="-5" r="1.5" fill="white" stroke="url(#etiquetteGrad)" stroke-width="0.5"/>
    <circle cx="0" cy="2" r="1.5" fill="white" stroke="url(#etiquetteGrad)" stroke-width="0.5"/>
    <circle cx="0" cy="9" r="1.5" fill="white" stroke="url(#etiquetteGrad)" stroke-width="0.5"/>
    
    <!-- 西装口袋 -->
    <rect x="-18" y="5" width="8" height="6" rx="1" fill="none" stroke="url(#etiquetteGrad)" stroke-width="1" opacity="0.6"/>
    <rect x="10" y="5" width="8" height="6" rx="1" fill="none" stroke="url(#etiquetteGrad)" stroke-width="1" opacity="0.6"/>
    
    <!-- 胸前口袋 -->
    <rect x="8" y="-8" width="6" height="4" rx="0.5" fill="none" stroke="url(#etiquetteGrad)" stroke-width="0.8" opacity="0.7"/>
    <!-- 口袋巾 -->
    <path d="M 9 -7 L 11 -9 L 13 -7" fill="none" stroke="url(#etiquetteGrad)" stroke-width="0.8" opacity="0.5"/>
  </g>
  
  <!-- 衬衫 -->
  <rect x="42" y="30" width="16" height="25" fill="white" opacity="0.9"/>
  <rect x="43" y="31" width="14" height="23" fill="white"/>
  
  <!-- 领带 -->
  <g transform="translate(50, 35)">
    <!-- 领带结 -->
    <path d="M -3 -5 L 3 -5 L 4 -2 L -4 -2 Z" fill="url(#tiePattern)"/>
    <path d="M -4 -2 L 4 -2 L 3 0 L -3 0 Z" fill="url(#etiquetteGrad)" opacity="0.8"/>
    
    <!-- 领带主体 -->
    <path d="M -3 0 L 3 0 L 2 20 L 0 25 L -2 20 Z" fill="url(#tiePattern)"/>
    
    <!-- 领带图案 -->
    <circle cx="0" cy="5" r="1" fill="url(#etiquetteGrad)" opacity="0.4"/>
    <circle cx="0" cy="10" r="1" fill="url(#etiquetteGrad)" opacity="0.4"/>
    <circle cx="0" cy="15" r="1" fill="url(#etiquetteGrad)" opacity="0.4"/>
  </g>
  
  <!-- 衬衫领子 -->
  <path d="M 42 30 L 47 25 L 50 30 L 53 25 L 58 30 L 58 35 L 42 35 Z" fill="white" stroke="url(#etiquetteGrad)" stroke-width="0.5" opacity="0.9"/>
  
  <!-- 装饰性元素 -->
  <!-- 星形装饰 -->
  <g transform="translate(20, 20)">
    <path d="M 0 -2 L 0.5 0 L 2 0 L 0.5 1 L 1 3 L 0 2 L -1 3 L -0.5 1 L -2 0 L -0.5 0 Z" fill="url(#etiquetteGrad)" opacity="0.5"/>
  </g>
  
  <g transform="translate(80, 25)">
    <path d="M 0 -1.5 L 0.3 0 L 1.5 0 L 0.3 0.8 L 0.8 2 L 0 1.5 L -0.8 2 L -0.3 0.8 L -1.5 0 L -0.3 0 Z" fill="url(#etiquetteGrad)" opacity="0.4"/>
  </g>
  
  <!-- 装饰性圆点 -->
  <circle cx="25" cy="75" r="1.5" fill="url(#etiquetteGrad)" opacity="0.6"/>
  <circle cx="75" cy="75" r="1" fill="url(#etiquetteGrad)" opacity="0.4"/>
</svg>
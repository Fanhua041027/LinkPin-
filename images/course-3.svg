<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 技术面试突破指南 - 代码和齿轮图标 -->
  <defs>
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="45" fill="url(#techGrad)" opacity="0.1"/>
  
  <!-- 代码窗口 -->
  <rect x="20" y="25" width="60" height="40" rx="4" fill="url(#techGrad)" opacity="0.8"/>
  <rect x="22" y="27" width="56" height="36" rx="2" fill="white"/>
  
  <!-- 代码行 -->
  <rect x="25" y="32" width="20" height="2" fill="#667eea"/>
  <rect x="47" y="32" width="15" height="2" fill="#764ba2"/>
  <rect x="25" y="37" width="25" height="2" fill="#667eea"/>
  <rect x="52" y="37" width="10" height="2" fill="#764ba2"/>
  <rect x="25" y="42" width="18" height="2" fill="#667eea"/>
  <rect x="45" y="42" width="20" height="2" fill="#764ba2"/>
  <rect x="25" y="47" width="30" height="2" fill="#667eea"/>
  <rect x="25" y="52" width="22" height="2" fill="#764ba2"/>
  <rect x="49" y="52" width="13" height="2" fill="#667eea"/>
  
  <!-- 齿轮 -->
  <g transform="translate(65, 75)">
    <circle cx="0" cy="0" r="8" fill="url(#techGrad)"/>
    <circle cx="0" cy="0" r="4" fill="white"/>
    <!-- 齿轮齿 -->
    <rect x="-1" y="-12" width="2" height="4" fill="url(#techGrad)"/>
    <rect x="-1" y="8" width="2" height="4" fill="url(#techGrad)"/>
    <rect x="8" y="-1" width="4" height="2" fill="url(#techGrad)"/>
    <rect x="-12" y="-1" width="4" height="2" fill="url(#techGrad)"/>
    <rect x="6" y="-7" width="3" height="2" fill="url(#techGrad)" transform="rotate(45)"/>
    <rect x="6" y="5" width="3" height="2" fill="url(#techGrad)" transform="rotate(45)"/>
    <rect x="-9" y="-7" width="3" height="2" fill="url(#techGrad)" transform="rotate(-45)"/>
    <rect x="-9" y="5" width="3" height="2" fill="url(#techGrad)" transform="rotate(-45)"/>
  </g>
  
  <!-- 装饰性元素 -->
  <circle cx="15" cy="15" r="2" fill="url(#techGrad)" opacity="0.6"/>
  <circle cx="85" cy="20" r="1.5" fill="url(#techGrad)" opacity="0.4"/>
  <circle cx="20" cy="80" r="1" fill="url(#techGrad)" opacity="0.5"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 沟通表达能力提升 - 麦克风和声波图标 -->
  <defs>
    <linearGradient id="commGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="45" fill="url(#commGrad)" opacity="0.1"/>
  
  <!-- 麦克风主体 -->
  <g transform="translate(50, 45)">
    <!-- 麦克风头部 -->
    <rect x="-6" y="-20" width="12" height="25" rx="6" fill="url(#commGrad)"/>
    <rect x="-4" y="-18" width="8" height="21" rx="4" fill="white" opacity="0.3"/>
    
    <!-- 麦克风网格 -->
    <line x1="-3" y1="-15" x2="3" y2="-15" stroke="url(#commGrad)" stroke-width="0.5" opacity="0.6"/>
    <line x1="-3" y1="-12" x2="3" y2="-12" stroke="url(#commGrad)" stroke-width="0.5" opacity="0.6"/>
    <line x1="-3" y1="-9" x2="3" y2="-9" stroke="url(#commGrad)" stroke-width="0.5" opacity="0.6"/>
    <line x1="-3" y1="-6" x2="3" y2="-6" stroke="url(#commGrad)" stroke-width="0.5" opacity="0.6"/>
    <line x1="-3" y1="-3" x2="3" y2="-3" stroke="url(#commGrad)" stroke-width="0.5" opacity="0.6"/>
    
    <!-- 麦克风支架 -->
    <rect x="-1" y="5" width="2" height="15" fill="url(#commGrad)" opacity="0.8"/>
    
    <!-- 麦克风底座 -->
    <ellipse cx="0" cy="22" rx="8" ry="3" fill="url(#commGrad)"/>
    <ellipse cx="0" cy="20" rx="8" ry="3" fill="url(#commGrad)" opacity="0.6"/>
  </g>
  
  <!-- 声波 -->
  <g transform="translate(50, 35)">
    <!-- 第一层声波 -->
    <path d="M 15 0 Q 20 -8 25 0 Q 20 8 15 0" fill="none" stroke="url(#commGrad)" stroke-width="2" opacity="0.8"/>
    <path d="M -15 0 Q -20 -8 -25 0 Q -20 8 -15 0" fill="none" stroke="url(#commGrad)" stroke-width="2" opacity="0.8"/>
    
    <!-- 第二层声波 -->
    <path d="M 20 0 Q 28 -12 35 0 Q 28 12 20 0" fill="none" stroke="url(#commGrad)" stroke-width="1.5" opacity="0.6"/>
    <path d="M -20 0 Q -28 -12 -35 0 Q -28 12 -20 0" fill="none" stroke="url(#commGrad)" stroke-width="1.5" opacity="0.6"/>
    
    <!-- 第三层声波 -->
    <path d="M 25 0 Q 35 -15 42 0 Q 35 15 25 0" fill="none" stroke="url(#commGrad)" stroke-width="1" opacity="0.4"/>
    <path d="M -25 0 Q -35 -15 -42 0 Q -35 15 -25 0" fill="none" stroke="url(#commGrad)" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- 音符装饰 -->
  <g transform="translate(75, 25)">
    <circle cx="0" cy="0" r="2" fill="url(#commGrad)" opacity="0.7"/>
    <rect x="2" y="-8" width="1" height="8" fill="url(#commGrad)" opacity="0.7"/>
    <path d="M 3 -8 Q 6 -10 6 -6" fill="none" stroke="url(#commGrad)" stroke-width="1" opacity="0.7"/>
  </g>
  
  <g transform="translate(25, 25)">
    <circle cx="0" cy="0" r="1.5" fill="url(#commGrad)" opacity="0.5"/>
    <rect x="1.5" y="-6" width="0.8" height="6" fill="url(#commGrad)" opacity="0.5"/>
  </g>
  
  <!-- 装饰性点 -->
  <circle cx="20" cy="75" r="1.5" fill="url(#commGrad)" opacity="0.6"/>
  <circle cx="80" cy="70" r="1" fill="url(#commGrad)" opacity="0.4"/>
  <circle cx="15" cy="20" r="1" fill="url(#commGrad)" opacity="0.5"/>
</svg>